<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Memo Scan – Essai gratuit</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:white;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
    .card{max-width:500px;width:100%;background:white;border-radius:2rem;padding:2rem;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,0.05)}
    .logo-icon{background:#4f6ef7;width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.8rem auto;font-size:1.8rem;font-weight:700;color:white}
    h1{font-size:1.9rem;font-weight:700;color:#4f6ef7;margin-bottom:0.5rem}
    .sub{font-size:1rem;color:#4a4f66;margin-bottom:1.8rem}
    input,select{width:100%;padding:12px 16px;margin:8px 0;border:1.5px solid #e2e6f0;border-radius:60px;font-size:1rem;background:#fefefc;outline:none}
    input:focus,select:focus{border-color:#4f6ef7;box-shadow:0 0 0 3px rgba(79,110,247,0.2)}
    button{width:100%;background:#4f6ef7;color:white;border:none;padding:14px;border-radius:60px;font-weight:700;font-size:1rem;cursor:pointer;transition:0.2s}
    button:hover{background:#3b5bdf;transform:scale(0.98)}
    .info-box{background:#f8faff;border-radius:1rem;padding:1rem;margin:1.2rem 0;text-align:left}
    .info-box p{font-size:0.85rem;color:#4a4f66;margin-bottom:0.5rem}
    .info-box .highlight{font-weight:600;color:#4f6ef7}
    .footer-note{margin-top:1rem;font-size:0.7rem;color:#8b90a7}
    button:disabled{background:#cbd5e1;cursor:not-allowed}
    .loader{display:inline-block;width:16px;height:16px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-left:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-icon">MS</div>
  <h1>Memo Scan</h1>
  <div class="sub">14 jours gratuits · Aucune inscription</div>

  <!-- Champs supplémentaires -->
  <input type="text" id="classe" placeholder="Classe (ex: 3e, 4e, CM2)" required>
  <input type="text" id="matiere" placeholder="Matière principale" required>
  <select id="pays">
    <option value="Reunion">La Réunion</option>
    <option value="Maurice">Maurice</option>
    <option value="France">France</option>
    <option value="Autre">Autre</option>
  </select>

  <button id="startBtn">Commencer à réviser</button>

  <div class="info-box">
    <p>🔒 <span class="highlight">Aucun email requis</span> – ton appareil est ton compte.</p>
    <p>🧠 <span class="highlight">8 modes d’étude</span> – cours, flashcards, QCM, exercices, mind map, interro chrono…</p>
    <p>🍃 <span class="highlight">14 jours gratuits</span> – sans carte bancaire, sans engagement.</p>
  </div>
  <div class="footer-note">Memo Scan · Smart Learn — révisions augmentées</div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGB_J6BzqhD4unqPePZw6LjP6p8D2n9arvKhE9DzIvVrmOIVppDurlsqJE-TRjZi8DVw/exec";

  async function getDeviceId() {
    const fingerprint = [
      navigator.userAgent,
      navigator.language,
      screen.width + 'x' + screen.height,
      Intl.DateTimeFormat().resolvedOptions().timeZone
    ].join('|');
    const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(fingerprint));
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('').substring(0,32);
  }

  const startBtn = document.getElementById('startBtn');
  let isProcessing = false;

  startBtn.addEventListener('click', async () => {
    if (isProcessing) return;
    isProcessing = true;
    startBtn.disabled = true;
    startBtn.innerHTML = "Préparation <span class='loader'></span>";

    try {
      const deviceId = await getDeviceId();
      const classe = document.getElementById('classe').value.trim();
      const matiere = document.getElementById('matiere').value.trim();
      const pays = document.getElementById('pays').value;
      if (!classe || !matiere) {
        alert("Veuillez renseigner ta classe et ta matière.");
        startBtn.disabled = false;
        startBtn.innerHTML = "Commencer à réviser";
        isProcessing = false;
        return;
      }

      const existingStartDate = localStorage.getItem('ms_trial_start');
      if (existingStartDate) {
        localStorage.setItem('ms_device_id', deviceId);
        window.location.href = "memoscan.html";
        return;
      }

      // Récupérer la source depuis l'URL (?src=...)
      const urlParams = new URLSearchParams(window.location.search);
      const source = urlParams.get('src') || 'direct';

      const url = `${SCRIPT_URL}?action=register&id=${deviceId}&source=${encodeURIComponent(source)}&classe=${encodeURIComponent(classe)}&matiere=${encodeURIComponent(matiere)}&pays=${encodeURIComponent(pays)}`;
      await fetch(url, { method: 'GET', mode: 'no-cors' });
      
      const now = new Date().toISOString();
      localStorage.setItem('ms_trial_start', now);
      localStorage.setItem('ms_device_id', deviceId);
      localStorage.setItem('ms_classe', classe);
      localStorage.setItem('ms_matiere', matiere);
      localStorage.setItem('ms_pays', pays);
      
      window.location.href = "memoscan.html";
    } catch (error) {
      console.error(error);
      alert("Une erreur technique s'est produite. Réessaie dans quelques instants.");
      startBtn.disabled = false;
      startBtn.innerHTML = "Commencer à réviser";
    } finally {
      isProcessing = false;
    }
  });
</script>
</body>
</html>
